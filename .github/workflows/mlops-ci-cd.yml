name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Unit Tests
        run: |
          cd backend && python -m pytest

  validate-pipeline:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Simulate DVC Pull and Train Model
        run: |
          # Since DVC remote credentials (e.g. Google Drive / GCS keys) are secrets
          # we run a dry run training check with local mock/sample files
          echo "Simulating DVC pull..."
          dvc status || true
          echo "Executing training pipeline dry run..."
          cd backend && python main.py

  docker-build:
    runs-on: ubuntu-latest
    needs: validate-pipeline
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: insurance-mlops-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

